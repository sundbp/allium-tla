SPECIFICATION Spec

CONSTANTS
    Users = {"u1", "u2"}
    Organisations = {"o1", "o2"}
    Subscriptions = {"sub1", "sub2", "sub3"}
    Plans = {"free", "pro", "enterprise"}
    Customers = {"cust1", "cust2"}
    StripeSubscriptions = {"ss1", "ss2", "ss3"}
    Invoices = {"inv1", "inv2", "inv3"}
    customerHasPaymentMethod = [c \in Customers |-> TRUE]
    invoiceCustomer = [i \in Invoices |-> IF i = "inv1" THEN "cust1" ELSE "cust2"]
    invoicePeriodEnd = [i \in Invoices |-> 30]
    invoiceAmount = [i \in Invoices |-> 100]
    invoiceNextPaymentAttempt = [i \in Invoices |-> 1]

INVARIANTS
    TypeOK
