SPECIFICATION Spec

CONSTANTS
    Users = {"u1", "u2", "u3"}
    Emails = {"alice@example.com", "bob@example.com", "carol@example.com"}
    Providers = {"google", "microsoft", "github"}
    Identities = {"id1", "id2", "id3"}
    Sessions = {"s1", "s2", "s3"}
    userEmail = [u \in Users |-> IF u = "u1" THEN "alice@example.com" ELSE IF u = "u2" THEN "bob@example.com" ELSE "carol@example.com"]
    identityEmail = [i \in Identities |-> IF i = "id1" THEN "alice@example.com" ELSE IF i = "id2" THEN "bob@example.com" ELSE "carol@example.com"]
    identityProvider = [i \in Identities |-> IF i = "id1" THEN "google" ELSE IF i = "id2" THEN "microsoft" ELSE "github"]

INVARIANTS
    TypeOK
