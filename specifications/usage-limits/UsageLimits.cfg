SPECIFICATION Spec

CONSTANTS
    Users = {"u1", "u2", "u3"}
    Workspaces = {"w1", "w2"}
    Plans = {"free", "pro", "enterprise"}
    Documents = {"d1", "d2", "d3", "d4", "d5"}
    Memberships = {"m1", "m2", "m3", "m4", "m5"}
    Features = {"basic_editing", "advanced_editing", "api_access", "integrations", "sso", "audit_log", "custom_branding"}
    planMaxDocuments = [p \in Plans |-> IF p = "free" THEN 10 ELSE IF p = "pro" THEN 1000 ELSE 1000]
    planHasUnlimitedDocuments = [p \in Plans |-> p = "enterprise"]
    planMaxTeamMembers = [p \in Plans |-> IF p = "free" THEN 3 ELSE IF p = "pro" THEN 20 ELSE 20]
    planHasUnlimitedMembers = [p \in Plans |-> p = "enterprise"]
    planMaxStorageBytes = [p \in Plans |-> IF p = "free" THEN 100 ELSE IF p = "pro" THEN 10000 ELSE 10000]
    planHasUnlimitedStorage = [p \in Plans |-> p = "enterprise"]
    planMaxApiRequestsPerDay = [p \in Plans |-> IF p = "free" THEN 100 ELSE IF p = "pro" THEN 10000 ELSE 10000]
    planHasApiQuota = [p \in Plans |-> p # "enterprise"]
    planFeatures = [p \in Plans |-> IF p = "free"
                                THEN {"basic_editing"}
                                ELSE IF p = "pro"
                                     THEN {"basic_editing", "advanced_editing", "api_access", "integrations"}
                                     ELSE {"basic_editing", "advanced_editing", "api_access", "integrations", "sso", "audit_log", "custom_branding"}]
    NextPlan = [p \in Plans |-> IF p = "free" THEN "pro" ELSE "enterprise"]

INVARIANTS
    TypeOK
